<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f2a20"/>
      <stop offset="1" stop-color="#0a1f17"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo mark, scaled up from the app favicon -->
  <g transform="translate(90,90)">
    <rect width="96" height="96" rx="24" fill="#1a4531"/>
    <polyline points="21,33 33,63 48,39 63,63 75,33" fill="none" stroke="#f5f5f0" stroke-width="8.4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="73.5" cy="24.9" r="6.6" fill="#d9a441"/>
  </g>

  <text x="212" y="150" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="500" fill="#f5f5f0">Wirby</text>

  <text x="90" y="330" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="500" fill="#f5f5f0">
    <tspan x="90" dy="0">Never wonder</tspan>
    <tspan x="90" dy="74">what's due.</tspan>
  </text>

  <text x="90" y="500" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#c2d4c1">
    Subscriptions, bills, renewals, and deadlines —
  </text>
  <text x="90" y="536" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#c2d4c1">
    ranked by what needs attention first.
  </text>

  <text x="90" y="590" font-family="'Courier New', monospace" font-size="20" fill="#9bb89e">wirby.app</text>
</svg>
